<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>录音按钮动画</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
        }

        h1 {
            color: #fff;
            margin-bottom: 40px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 60px;
            max-width: 1000px;
        }

        .demo-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* 基础按钮样式 */
        .record-btn {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .record-btn:active {
            transform: scale(0.95);
        }

        /* 风格1: 红色录音按钮 */
        .style1 .record-btn {
            background: linear-gradient(145deg, #ff6b6b, #ee5a5a);
            box-shadow: 0 4px 20px rgba(255, 107, 107, 0.4);
        }

        .style1 .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border: 2px solid #ff6b6b;
            border-radius: 50%;
            transition: all 0.1s ease;
        }

        .status {
            color: #8892b0;
            font-size: 14px;
            margin-top: 40px;
            text-align: center;
        }

        .status.active {
            color: #4ecdc4;
        }

        .volume-bar {
            width: 300px;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-top: 20px;
            overflow: hidden;
        }

        .volume-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4ecdc4, #ff6b6b);
            border-radius: 4px;
            transition: width 0.05s ease;
        }
    </style>
</head>
<body>
    <h1>录音按钮动画 - 实时音量</h1>
    
    <div class="container">
        <!-- 风格1: 红色 -->
        <div class="demo-item style1">
            <div class="record-btn">
                <div class="pulse-ring"></div>
            </div>
        </div>
    </div>

    <div class="volume-bar">
        <div class="volume-fill" id="volumeFill"></div>
    </div>

    <p class="status" id="status">点击按钮开启麦克风</p>

    <script>
        let audioContext;
        let analyser;
        let microphone;
        let isListening = false;
        let animationId;

        const recordBtns = document.querySelectorAll('.record-btn');
        const pulseRings = document.querySelectorAll('.pulse-ring');
        const volumeFill = document.getElementById('volumeFill');
        const status = document.getElementById('status');

        async function initAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                analyser.smoothingTimeConstant = 0.8;

                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);

                isListening = true;
                status.textContent = '🎙️ 正在监听声音...';
                status.classList.add('active');
                
                updateVolume();
            } catch (err) {
                console.error('麦克风访问失败:', err);
                status.textContent = '❌ 无法访问麦克风，请检查权限';
            }
        }

        function updateVolume() {
            if (!isListening) return;

            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);

            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            const average = sum / dataArray.length;
            const volume = Math.min(100, Math.round(average * 1.5));

            volumeFill.style.width = volume + '%';

            const baseSize = 80;
            const maxScale = 1.5;
            const scale = 1 + (volume / 100) * (maxScale - 1);

            pulseRings.forEach(ring => {
                ring.style.width = (baseSize * scale) + 'px';
                ring.style.height = (baseSize * scale) + 'px';
            });

            animationId = requestAnimationFrame(updateVolume);
        }

        recordBtns.forEach((btn, index) => {
            btn.addEventListener('click', async () => {
                if (!isListening) {
                    await initAudio();
                }
            });
        });
    </script>
</body>
</html>
